<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users - Gracewise</title>
    <link rel="stylesheet" href="css/admin-sidebar.css">
    <link rel="stylesheet" href="css/all-users.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="js/auth.js" defer></script>
</head>
<body>
    <!-- Mobile Menu Toggle -->
    <div class="mobile-menu-toggle">
        <i class="fas fa-bars"></i>
    </div>
    
    <!-- Mobile Overlay -->
    <div class="mobile-overlay"></div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="assest/logo/main_logo.png" alt="Gracewise Logo">
        </div>
        <nav class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="all-users.html" class="nav-item active">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a href="admin-curriculum.html" class="nav-item">
                <i class="fas fa-book"></i>
                <span>Curriculum</span>
            </a>
            <a href="admin-quiz.html" class="nav-item">
                <i class="fas fa-question-circle"></i>
                <span>Quiz Management</span>
            </a>
        </nav>

        <div class="sidebar-footer">

            <div class="user-section">
                <a href="#">
                    <i class="fas fa-cog"></i>
                    Settings</a>
                <a href="#" onclick="auth.logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="What do you want to learn">
            </div>
            <div class="header-right">
                <div class="profile">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=32&h=32&fit=crop&crop=face" alt="Profile">
                    <span>Jason Doulo</span>
                </div>
                <div class="date">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="current-date">Jan 15, 2024</span>
                </div>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                </div>
            </div>
        </header>

        <!-- Users Content -->
        <div class="dashboard-container">
            <div class="users-container">
                <div class="users-header">
                    <h1>All users</h1>
                    <div class="users-controls">
                        <div class="search-users">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="Search">
                        </div>
                        <select class="sort-dropdown">
                            <option>Sort by: Newest</option>
                            <option>Sort by: Oldest</option>
                            <option>Sort by: Name A-Z</option>
                            <option>Sort by: Name Z-A</option>
                        </select>
                    </div>
                </div>

                <table class="users-table">
                    <thead>
                        <tr>
                            <th>User Name</th>
                            <th>Email</th>
                            <th>Registered Date</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body">
                        <tr>
                            <td colspan="4" class="text-center">Loading users...</td>
                        </tr>
                    </tbody>
                </table>

                <div class="pagination">
                    <div class="pagination-info" id="pagination-info">
                        Loading...
                    </div>
                    <div class="pagination-controls" id="pagination-controls">
                        <!-- Pagination buttons will be generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu functionality
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const body = document.body;

        function toggleMobileMenu() {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            body.classList.toggle('menu-open');
            
            // Toggle icon between bars and times
            const icon = mobileToggle.querySelector('i');
            if (sidebar.classList.contains('mobile-open')) {
                icon.className = 'fas fa-times';
            } else {
                icon.className = 'fas fa-bars';
            }
        }

        mobileToggle.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', toggleMobileMenu);
        
        // Update current date
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
        });

        // State variables
        let currentPage = 1;
        let totalPages = 1;
        let searchTerm = '';
        const perPage = 10;

        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        // Load users from API
        async function loadUsers(page = 1, search = '') {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = 'sign_in.html';
                    return;
                }

                const url = new URL('http://localhost:5000/auth/all-users');
                url.searchParams.append('page', page);
                url.searchParams.append('per_page', perPage);
                if (search) {
                    url.searchParams.append('search', search);
                }

                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401 || response.status === 403) {
                        localStorage.removeItem('access_token');
                        window.location.href = 'sign_in.html';
                        return;
                    }
                    throw new Error('Failed to fetch users');
                }

                const data = await response.json();
                displayUsers(data.users);
                updatePagination(data.page, data.total_pages, data.total);
                currentPage = data.page;
                totalPages = data.total_pages;

            } catch (error) {
                console.error('Error loading users:', error);
                document.getElementById('users-table-body').innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 20px; color: #dc2626;">
                            Failed to load users. Please try again.
                        </td>
                    </tr>
                `;
            }
        }

        // Display users in table
        function displayUsers(users) {
            const tbody = document.getElementById('users-table-body');
            
            if (users.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 20px;">
                            No users found.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = users.map(user => `
                <tr>
                    <td class="user-name">${user.first_name || ''} ${user.last_name || ''}</td>
                    <td>${user.email}</td>
                    <td>${formatDate(user.created_at)}</td>
                    <td>
                        <span class="status-badge ${user.is_active ? 'status-active' : 'status-inactive'}">
                            ${user.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        // Update pagination info and controls
        function updatePagination(page, totalPagesCount, totalCount) {
            const start = (page - 1) * perPage + 1;
            const end = Math.min(page * perPage, totalCount);
            
            document.getElementById('pagination-info').textContent = 
                `Showing data ${start} to ${end} of ${totalCount} entries`;

            const paginationControls = document.getElementById('pagination-controls');
            let html = '';

            // Previous button
            html += `<button class="pagination-btn" ${page === 1 ? 'disabled' : ''} onclick="changePage(${page - 1})">
                <i class="fas fa-chevron-left"></i>
            </button>`;

            // Page numbers
            const maxButtons = 5;
            let startPage = Math.max(1, page - Math.floor(maxButtons / 2));
            let endPage = Math.min(totalPagesCount, startPage + maxButtons - 1);
            
            if (endPage - startPage < maxButtons - 1) {
                startPage = Math.max(1, endPage - maxButtons + 1);
            }

            if (startPage > 1) {
                html += `<button class="pagination-btn" onclick="changePage(1)">1</button>`;
                if (startPage > 2) {
                    html += `<span>...</span>`;
                }
            }

            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="pagination-btn ${i === page ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            }

            if (endPage < totalPagesCount) {
                if (endPage < totalPagesCount - 1) {
                    html += `<span>...</span>`;
                }
                html += `<button class="pagination-btn" onclick="changePage(${totalPagesCount})">${totalPagesCount}</button>`;
            }

            // Next button
            html += `<button class="pagination-btn" ${page === totalPagesCount ? 'disabled' : ''} onclick="changePage(${page + 1})">
                <i class="fas fa-chevron-right"></i>
            </button>`;

            paginationControls.innerHTML = html;
        }

        // Change page
        function changePage(page) {
            if (page >= 1 && page <= totalPages) {
                loadUsers(page, searchTerm);
            }
        }

        // Search functionality
        let searchTimeout;
        document.querySelector('.search-users input').addEventListener('input', function(e) {
            clearTimeout(searchTimeout);
            searchTerm = e.target.value;
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadUsers(1, searchTerm);
            }, 500);
        });

        // Sort functionality
        document.querySelector('.sort-dropdown').addEventListener('change', function(e) {
            // Implement sorting logic here if needed
            console.log('Sort by:', e.target.value);
        });

        // Initial load
        loadUsers();
    </script>
</body>
</html>
