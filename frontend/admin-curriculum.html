<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Curriculum - Gracewise</title>
    <link rel="stylesheet" href="css/admin-sidebar.css">
    <link rel="stylesheet" href="css/admin-curriculum.css">
    <link rel="stylesheet" href="css/toast.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="js/toast.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/config.js"></script>
</head>
<body>
    <!-- Mobile Menu Toggle -->
    <div class="mobile-menu-toggle">
        <i class="fas fa-bars"></i>
    </div>
    
    <!-- Mobile Overlay -->
    <div class="mobile-overlay"></div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="assest/logo/main_logo.png" alt="Gracewise Logo">
        </div>
        <nav class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="all-users.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a href="admin-curriculum.html" class="nav-item active">
                <i class="fas fa-book"></i>
                <span>Curriculum</span>
            </a>
            <a href="admin-quiz.html" class="nav-item">
                <i class="fas fa-question-circle"></i>
                <span>Quiz Management</span>
            </a>
            <a href="admin-settings.html" class="nav-item">
                <i class="fas fa-sliders-h"></i>
                <span>AI Settings</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-section">
                <a href="#">
                    <i class="fas fa-cog"></i>
                    Settings</a>
                <a href="#" onclick="auth.logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="What do you want to learn">
            </div>
            <div class="header-right">
                <div class="avatar">
                    <i class="fas fa-user-circle" style="font-size: 32px; color: #b59c61;"></i>
                </div>
            </div>
        </header>

        <!-- Curriculum Content -->
        <div class="dashboard-container">
            <!-- Action Bar -->
            <div class="action-bar">
                <button class="btn-primary" onclick="showCreateCurriculumModal()">
                    <i class="fas fa-plus"></i> Create Curriculum
                </button>
            </div>

            <!-- Curriculum List -->
            <div id="curriculumList" class="curriculum-list">
                <!-- Curriculum items will be loaded here -->
                <div class="loading">Loading curriculum...</div>
            </div>
        </div>
    </div>

    <!-- Create Curriculum Modal -->
    <div id="createCurriculumModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Curriculum</h2>
                <span class="close" onclick="closeCreateCurriculumModal()">&times;</span>
            </div>
            <form id="createCurriculumForm" onsubmit="createCurriculum(event)">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" name="title" required placeholder="e.g., Mathematics">
                </div>
                <div class="form-group">
                    <label>Description *</label>
                    <textarea name="description" required placeholder="Brief description of the curriculum"></textarea>
                </div>
                <div class="form-group">
                    <label>Age Group</label>
                    <input type="text" name="age_group" placeholder="e.g., 6-8 years">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeCreateCurriculumModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Curriculum</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Create Module Modal -->
    <div id="createModuleModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Module</h2>
                <span class="close" onclick="closeCreateModuleModal()">&times;</span>
            </div>
            <form id="createModuleForm" onsubmit="createModule(event)">
                <input type="hidden" name="curriculum_id" id="moduleCurriculumId">
                <div class="form-group">
                    <label>Module Name *</label>
                    <input type="text" name="name" required placeholder="e.g., Algebra Basics">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" placeholder="Brief description of the module"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeCreateModuleModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Create Module</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Upload Lesson Modal -->
    <div id="uploadLessonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Upload Lesson</h2>
                <span class="close" onclick="closeUploadLessonModal()">&times;</span>
            </div>
            <form id="uploadLessonForm" onsubmit="uploadLesson(event)">
                <input type="hidden" name="module_id" id="lessonModuleId">
                <div class="form-group">
                    <label>Lesson Name *</label>
                    <input type="text" name="name" required placeholder="e.g., Introduction to Equations">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" placeholder="Brief description of the lesson"></textarea>
                </div>
                <div class="form-group">
                    <label>Upload File * (PDF or TXT)</label>
                    <input type="file" name="file" id="lessonFile" accept=".pdf,.txt" required>
                    <small>Maximum file size: 10MB</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeUploadLessonModal()">Cancel</button>
                    <button type="submit" class="btn-primary">Upload Lesson</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Mobile menu functionality
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const body = document.body;

        function toggleMobileMenu() {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            body.classList.toggle('menu-open');
            
            const icon = mobileToggle.querySelector('i');
            if (sidebar.classList.contains('mobile-open')) {
                icon.className = 'fas fa-times';
            } else {
                icon.className = 'fas fa-bars';
            }
        }

        mobileToggle.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', toggleMobileMenu);
    </script>
    <script src="js/admin-curriculum.js"></script>
</body>
</html>
