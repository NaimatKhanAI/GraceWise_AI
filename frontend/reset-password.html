<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GraceWise</title>
    <link rel="stylesheet" href="css/signin-style.css">
    <link rel="stylesheet" href="css/notifications.css">
    <script src="js/config.js"></script>
    <script src="js/notifications.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>
<body>
    <div class="signin-container">
        <div class="signin-left">
            <img src="assest/signs_pic.png" alt="GraceWise" class="student-image">
        </div>

        <div class="signin-right">
            <div class="signin-form">
                <h1>Reset Password</h1>
                <form id="resetForm">
                    <div class="input-group password-group">
                        <input type="password" id="newPassword" placeholder="New Password" required minlength="6">
                    </div>
                    <div class="input-group password-group">
                        <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
                    </div>
                    <button type="submit" class="signin-btn">Update Password</button>
                    <p class="signup-link"><a href="sign_in.html">Back to Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function () {
            const params = new URLSearchParams(window.location.search);
            const token = (params.get('token') || '').trim();
            if (!token) {
                showError('Missing reset token. Please request a new link.');
                return;
            }

            const validation = await auth.validateResetToken(token);
            if (!validation.valid) {
                showError(validation.message || 'Invalid or expired reset token.');
            }

            document.getElementById('resetForm').addEventListener('submit', async function (e) {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                if (newPassword !== confirmPassword) {
                    showError('Passwords do not match.');
                    return;
                }

                const result = await auth.resetPassword(token, newPassword);
                if (result.success) {
                    showSuccess(result.message || 'Password updated successfully.');
                    setTimeout(() => {
                        window.location.href = 'sign_in.html';
                    }, 1400);
                } else {
                    showError(result.message || 'Could not reset password.');
                }
            });
        });
    </script>
</body>
</html>
