<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gracewise</title>
    <link rel="stylesheet" href="css/admin-sidebar.css">
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="js/notifications.js" defer></script>
    <script src="js/auth.js" defer></script>
  
</head>
<body>
    <!-- Mobile Menu Toggle -->
    <div class="mobile-menu-toggle">
        <i class="fas fa-bars"></i>
    </div>
    
    <!-- Mobile Overlay -->
    <div class="mobile-overlay"></div>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="assest/logo/main_logo.png" alt="Gracewise Logo">
        </div>
        <nav class="nav-menu">
            <a href="admin-dashboard.html" class="nav-item active">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>
            <a href="all-users.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a href="admin-curriculum.html" class="nav-item">
                <i class="fas fa-book"></i>
                <span>Curriculum</span>
            </a>
            <a href="admin-quiz.html" class="nav-item">
                <i class="fas fa-question-circle"></i>
                <span>Quiz Management</span>
            </a>
        </nav>

        <div class="sidebar-footer">

            <div class="user-section">
                <a href="#">
                    <i class="fas fa-cog"></i>
                    Settings</a>
                <a href="#" onclick="auth.logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Logout</a>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="What do you want to learn">
            </div>
            <div class="header-right">
                <div class="profile">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=32&h=32&fit=crop&crop=face" alt="Profile">
                    <span>Jason Doulo</span>
                </div>
                <div class="date">
                    <i class="fas fa-calendar-alt"></i>
                    <span id="current-date">Jan 15, 2024</span>
                </div>
                <div class="notification">
                    <i class="fas fa-bell"></i>
                </div>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Dashboard</h1>
                <p class="welcome-text">Welcome back, Sarah! Here's what's happening today 👋</p>
            </div>

            <!-- Stats Cards -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon total-users">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Total User</p>
                        <h3 id="total-users-count">0</h3>
                        <div class="stat-change positive" id="total-users-change">
                            <i class="fas fa-arrow-up"></i>
                            <span>0% this month</span>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon active-users">
                        <i class="fas fa-user-check"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Active user</p>
                        <h3 id="active-users-count">0</h3>
                        <div class="stat-change negative" id="active-users-change">
                            <i class="fas fa-arrow-down"></i>
                            <span>0% this month</span>
                        </div>
                    </div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-icon sleeping-users">
                        <i class="fas fa-user-clock"></i>
                    </div>
                    <div class="stat-info">
                        <p class="stat-label">Sleeping user</p>
                        <h3 id="sleeping-users-count">0</h3>
                        <div class="user-avatars">
                            <img src="https://images.unsplash.com/photo-1494790108755-2616b612b786?w=24&h=24&fit=crop&crop=face" alt="User 1">
                            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=24&h=24&fit=crop&crop=face" alt="User 2">
                            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=24&h=24&fit=crop&crop=face" alt="User 3">
                            <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=24&h=24&fit=crop&crop=face" alt="User 4">
                            <span class="more-users">+5</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Total Earning Chart -->
            <div class="chart-section">
                <div class="chart-card">
                    <div class="chart-header">
                        <h3>Total Earning</h3>
                        <select class="time-filter">
                            <option>Monthly</option>
                            <option>Weekly</option>
                            <option>Daily</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <div class="gauge-chart">
                            <svg width="200" height="120" viewBox="0 0 200 120">
                                <!-- Background arc -->
                                <path d="M 20 100 A 80 80 0 0 1 180 100" 
                                      stroke="#f3f4f6" 
                                      stroke-width="12" 
                                      fill="none"/>
                                <!-- Progress arc -->
                                <path d="M 20 100 A 80 80 0 0 1 140 40" 
                                      stroke="#814730" 
                                      stroke-width="12" 
                                      fill="none"
                                      stroke-linecap="round"/>
                                <!-- Needle -->
                                <line x1="100" y1="100" x2="140" y2="50" 
                                      stroke="#814730" 
                                      stroke-width="3"
                                      stroke-linecap="round"/>
                                <!-- Center dot -->
                                <circle cx="100" cy="100" r="6" fill="#814730"/>
                            </svg>
                        </div>
                        <div class="earning-amount">
                            <h2>$1020</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Mobile menu functionality
        const mobileToggle = document.querySelector('.mobile-menu-toggle');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.querySelector('.mobile-overlay');
        const body = document.body;

        function toggleMobileMenu() {
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
            body.classList.toggle('menu-open');
            
            // Toggle icon between bars and times
            const icon = mobileToggle.querySelector('i');
            if (sidebar.classList.contains('mobile-open')) {
                icon.className = 'fas fa-times';
            } else {
                icon.className = 'fas fa-bars';
            }
        }

        mobileToggle.addEventListener('click', toggleMobileMenu);
        overlay.addEventListener('click', toggleMobileMenu);

        // Update date
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('en-US', {
            month: 'short',
            day: 'numeric',
            year: 'numeric'
        });

        // Fetch and display dashboard statistics
        async function loadDashboardStats() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    window.location.href = 'sign_in.html';
                    return;
                }

                const response = await fetch('http://localhost:5000/dashboard/summary', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('access_token');
                        window.location.href = 'sign_in.html';
                        return;
                    }
                    throw new Error('Failed to fetch dashboard data');
                }

                const data = await response.json();
                
                // Update total users
                document.getElementById('total-users-count').textContent = data.total_users.toLocaleString();
                const totalUsersChange = document.getElementById('total-users-change');
                if (data.total_users_growth >= 0) {
                    totalUsersChange.className = 'stat-change positive';
                    totalUsersChange.innerHTML = `<i class="fas fa-arrow-up"></i><span>${data.total_users_growth}% this month</span>`;
                } else {
                    totalUsersChange.className = 'stat-change negative';
                    totalUsersChange.innerHTML = `<i class="fas fa-arrow-down"></i><span>${Math.abs(data.total_users_growth)}% this month</span>`;
                }

                // Update active users
                document.getElementById('active-users-count').textContent = data.active_users.toLocaleString();
                const activeUsersChange = document.getElementById('active-users-change');
                if (data.active_users_growth >= 0) {
                    activeUsersChange.className = 'stat-change positive';
                    activeUsersChange.innerHTML = `<i class="fas fa-arrow-up"></i><span>${data.active_users_growth}% this month</span>`;
                } else {
                    activeUsersChange.className = 'stat-change negative';
                    activeUsersChange.innerHTML = `<i class="fas fa-arrow-down"></i><span>${Math.abs(data.active_users_growth)}% this month</span>`;
                }

                // Update sleeping users
                document.getElementById('sleeping-users-count').textContent = data.sleeping_users.toLocaleString();

            } catch (error) {
                console.error('Error loading dashboard stats:', error);
            }
        }

        // Load stats when page loads
        loadDashboardStats();
    </script>
</body>
</html>
